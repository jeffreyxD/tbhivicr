<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketing System</title>
    <link rel="stylesheet" href="style1.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Auth Overlay -->
        <div id="authOverlay" class="auth-overlay">
            <div class="auth-container">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Login</button>
                    <button class="auth-tab" data-tab="register">Register</button>
                </div>
                
                <!-- Login Form -->
                <form id="loginForm" class="auth-form active">
                    <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary full-width">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                    <div id="loginMessage" class="message"></div>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form">
                    <h2><i class="fas fa-user-plus"></i> Register</h2>
                    <div class="form-group">
                        <label for="regUsername">Username</label>
                        <input type="text" id="regUsername" required minlength="3">
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary full-width">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                    <div id="registerMessage" class="message"></div>
                </form>
            </div>
        </div>

        <!-- Main App -->
        <div id="mainApp" class="main-app" style="display: none;">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <h1><i class="fas fa-ticket-alt"></i> Ticketing System</h1>
                    <div class="user-info">
                        <span id="userName">Welcome!</span>
                        <span id="userRole" class="role-badge"></span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="stats">
                        <span class="stat open"><i class="fas fa-circle"></i> Open: <span id="openCount">0</span></span>
                        <span class="stat in-progress"><i class="fas fa-spinner"></i> In Progress: <span id="progressCount">0</span></span>
                        <span class="stat closed"><i class="fas fa-check-circle"></i> Closed: <span id="closedCount">0</span></span>
                    </div>
                    <button id="logoutBtn" class="btn btn-secondary">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </header>

            <!-- Create Ticket Form -->
            <div class="form-section">
                <h2><i class="fas fa-plus-circle"></i> Create New Ticket</h2>
                <form id="ticketForm">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" rows="4" required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="priority">Priority</label>
                            <select id="priority" required>
                                <option value="">Select Priority</option>
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                                <option value="urgent">Urgent</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="">Select Category</option>
                                <option value="bug">Bug</option>
                                <option value="feature">Feature Request</option>
                                <option value="support">Support</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-ticket-alt"></i> Create Ticket
                    </button>
                </form>
            </div>

            <!-- Tickets Section -->
            <div class="tickets-section">
                <div class="section-tabs">
                    <button class="tab-btn active" data-status="all">All</button>
                    <button class="tab-btn" data-status="open">Open</button>
                    <button class="tab-btn" data-status="in-progress">In Progress</button>
                    <button class="tab-btn" data-status="closed">Closed</button>
                </div>
                <div class="tickets-list" id="ticketsList">
                    <div class="loading">Loading tickets...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
